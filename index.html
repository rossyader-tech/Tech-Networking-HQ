function editPerson(id){
  const p=person(id);
  const t=prompt('Title',p.title||'');if(t!==null)p.title=t.trim();
  const c=prompt('Company',p.company||'');if(c!==null)p.company=c.trim();
  const sv=prompt('Seniority (e.g. VP, Head, Director)',p.seniority||'');if(sv!==null){p.seniority=sv.trim();const s=guessSeniority(p.title||sv);p.srank=s.rank;}
  const w=prompt('Why them — what makes this someone you\u2019d want to work for?',p.why||'');if(w!==null)p.why=w.trim();
  saveDB();renderPersonFull(p);
}
function clearPersonIntro(id){const p=person(id);p.introContactId='';saveDB();renderPersonFull(p);}
async function draftIntroMsg(pid){
  const p=person(pid);const via=(p&&p.introContactId)?contact(p.introContactId):null;
  if(!via){toast('Link a connector first');return;}
  if(!AI.key()){goTab('settings');toast('Add your Anthropic key in Settings');return;}
  const btn=$('#introDraftBtn');const label=btn?btn.innerHTML:'';
  if(btn){btn.innerHTML='<span class="spinner"></span> Drafting…';btn.disabled=true;}
  try{
    const msg=await AI.draftIntro(via,p);
    $('#introDraftOut').innerHTML=`<textarea class="ta" id="introDraftTa" style="min-height:160px">${esc(msg)}</textarea>
      <button class="btn sm" style="margin-top:.4rem" onclick="navigator.clipboard.writeText($('#introDraftTa').value);toast('Copied')">Copy</button>
      <button class="btn ghost sm" style="margin-top:.4rem;margin-left:.4rem" onclick="draftIntroMsg('${pid}')">↻ Redraft</button>`;
  }catch(e){$('#introDraftOut').innerHTML=`<div class="empty" style="color:var(--red)">Couldn\u2019t draft that: ${esc(e.message)}</div>`;}
  if(btn){btn.innerHTML=label;btn.disabled=false;}
}
function mountPersonIntroAutocomplete(pid){
  const wrap=$('#pIntroAc');if(!wrap)return;
  wrap.innerHTML=`<input id="pIntroInp" placeholder="+ Find a connector — type a name…" style="width:100%;padding:.5rem .7rem;border:1px solid var(--line);border-radius:var(--r-sm);outline:none"><div id="pIntroResults"></div>`;
  const inp=$('#pIntroInp'),res=$('#pIntroResults');
  inp.oninput=()=>{
    const q=inp.value.trim().toLowerCase();res.innerHTML='';if(q.length<2)return;
    const matches=DB.contacts.filter(c=>(c.name||'').toLowerCase().includes(q)||(c.company||'').toLowerCase().includes(q)||(c.title||'').toLowerCase().includes(q)).slice(0,6);
    let html='<div class="ac-list">';
    matches.forEach(c=>{html+=`<div class="ac-item" onclick="setPersonIntro('${pid}','${c.id}')"><div class="acn">${esc(c.name)}</div><div class="act">${esc(c.title||c.roleType)} · ${esc(c.company)}</div></div>`;});
    html+='</div>';res.innerHTML=matches.length?html:'<div class="ac-list"><div class="ac-item subtle">No one in your network matches — you may need a cold path.</div></div>';
  };
}
function setPersonIntro(pid,cid){const p=person(pid);p.introContactId=cid;if(p.status==='Identified'||p.status==='Need a path')p.status='Need a path';saveDB();renderPersonFull(p);toast('Connector linked');}
function promotePerson(id){
  const p=person(id);if(!p)return;
  const s=guessSeniority(p.title||'')||{};
  const c={id:uid('c'),name:p.name,company:p.company||'',title:p.title||'',seniority:p.seniority||s.label||'',srank:p.srank||s.rank||1,
    strength:'Weak',roleType:'Hiring Manager',roleRaw:'Hiring Manager',lastTouch:'',nextTouch:'',status:'New',nextStep:'Check in',email:'',notes:p.why?('Why: '+p.why):'',touchpoints:[],isTarget:false,source:'people-to-meet'};
  DB.contacts.push(c);
  DB.people=DB.people.filter(x=>x.id!==id);
  saveDB();toast('Moved to your network');cMode='network';goTab('contacts');openContactFull(c.id);
}

/* ---- LinkedIn connections importer ---- */
function coCanon(s){
  return (s||'').toLowerCase()
    .replace(/&/g,' and ')
    .replace(/[.,]/g,' ')
    .replace(/\b(inc|llc|ltd|corp|incorporated|company|the)\b/g,' ')
    .replace(/[^a-z0-9 ]/g,' ')
    .replace(/\s+/g,' ').trim();
}
const LI_EXCLUDE=/(engineer|software|developer|\bfrontend\b|\bbackend\b|attorney|counsel|\blegal\b|paralegal|recruit|talent acquisition|human resources|accountant|accounting|controller|data scientist|data engineer|\bux\b|ui design|graphic design|product design|\bnurse\b|therapist|physician|teacher|professor|realtor|real estate|supply chain|warehouse|logistics|information technology|cybersecurity|customer success|customer experience|account executive|sales development|sales representative|inside sales|underwrit|\bclaims\b)/i;
const LI_INCLUDE=/(partner|affiliate|marketing|growth|business development|biz dev|\bbd\b|demand|acquisition|lifecycle|performance|\bbrand\b|commerce|go-to-market|\bgtm\b|channel|alliance|influencer|monetization|retention|\bcrm\b|\bmedia\b|revenue)/i;
function liRelevant(title){const t=(title||'');if(!t.trim())return false;if(LI_EXCLUDE.test(t))return false;return LI_INCLUDE.test(t);}
function parseCSV(text){
  const rows=[];let i=0,field='',row=[],inQ=false;
  const s=(text||'').replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  while(i<s.length){const ch=s[i];
    if(inQ){
      if(ch==='"'){if(s[i+1]==='"'){field+='"';i+=2;continue;}inQ=false;i++;continue;}
      field+=ch;i++;continue;
    }else{
      if(ch==='"'){inQ=true;i++;continue;}
      if(ch===','){row.push(field);field='';i++;continue;}
      if(ch==='\n'){row.push(field);rows.push(row);row=[];field='';i++;continue;}
      field+=ch;i++;continue;
    }
  }
  if(field.length||row.length){row.push(field);rows.push(row);}
  return rows;
}
function importLinkedIn(){
  const text=($('#liText')&&$('#liText').value)||'';
  if(!text.trim()){toast('Paste your connections.csv text first');return;}
  const rows=parseCSV(text);
  if(!rows.length){toast('Couldn\u2019t read that CSV');return;}
  let hi=rows.findIndex(r=>r.map(x=>(x||'').trim().toLowerCase()).indexOf('first name')>-1);
  if(hi<0)hi=0;
  const hdr=rows[hi].map(x=>(x||'').trim().toLowerCase());
  const ci={first:hdr.indexOf('first name'),last:hdr.indexOf('last name'),url:hdr.indexOf('url'),company:hdr.indexOf('company'),pos:hdr.indexOf('position'),conn:hdr.indexOf('connected on')};
  if(ci.first<0||ci.company<0){toast('That doesn\u2019t look like a LinkedIn connections export');return;}
  // cache the FULL directory locally (browser-only, not synced) for the Directory search
  const dir=[];
  for(let r=hi+1;r<rows.length;r++){
    const row=rows[r];if(!row||!row.length)continue;
    const nm=(((row[ci.first]||'')+' '+(row[ci.last]||'')).trim());if(!nm)continue;
    dir.push({id:'d'+r,name:nm,title:(ci.pos>-1?row[ci.pos]||'':'').trim(),company:(ci.company>-1?row[ci.company]||'':'').trim(),url:(ci.url>-1?row[ci.url]||'':'').trim(),conn:(ci.conn>-1?row[ci.conn]||'':'').trim()});
  }
  DIR=dir;try{localStorage.setItem('hq_dir_v1',JSON.stringify(dir));}catch(e){}
  const targets={};DB.companies.forEach(co=>{if(co.tier==='A'||co.tier==='B'){const k=coCanon(co.name);if(k)targets[k]=co.name;}});
  const have=new Set(DB.contacts.map(c=>canonName(c.name)));
  const haveUrl=new Set(DB.contacts.map(c=>(c.linkedinUrl||'').replace(/\/+$/,'')).filter(Boolean));
  const add=[],dupes=[],byCo={};
  for(let r=hi+1;r<rows.length;r++){
    const row=rows[r];if(!row||!row.length)continue;
    const name=(((row[ci.first]||'')+' '+(row[ci.last]||'')).trim());if(!name)continue;
    const company=(ci.company>-1?row[ci.company]||'':'').trim();if(!company)continue;
    const ck=coCanon(company);const target=targets[ck];if(!target)continue;
    const title=(ci.pos>-1?row[ci.pos]||'':'').trim();
    if(!liRelevant(title))continue;
    const url=(ci.url>-1?row[ci.url]||'':'').trim();
    const conn=(ci.conn>-1?row[ci.conn]||'':'').trim();
    if(have.has(canonName(name))||(url&&haveUrl.has(url.replace(/\/+$/,'')))){dupes.push(name);continue;}
    have.add(canonName(name));
    const sn=guessSeniority(title);
    const senior=/director|vice president|\bvp\b|head|chief|\bgm\b|general manager|svp|evp|principal/i.test(title);
    const rt=senior?'Hiring Manager':'Connector';
    add.push({id:uid('c'),name,company:target,title,seniority:sn.label,srank:sn.rank,strength:'Weak',
      roleType:rt,roleRaw:'LinkedIn import',lastTouch:'',nextTouch:'',status:'New',nextStep:'Check in',
      email:'',notes:'LinkedIn · '+target+(conn?' · connected '+conn:''),linkedinUrl:url,touchpoints:[],isTarget:false,source:'linkedin'});
    (byCo[target]=byCo[target]||[]).push(name);
  }
  window._liAdd=add;
  showLinkedInPreview(add,dupes,byCo);
}
function showLinkedInPreview(add,dupes,byCo){
  const cos=Object.keys(byCo).sort((a,b)=>byCo[b].length-byCo[a].length);
  let html=`<div class="subtle" style="font-size:.85rem;margin-bottom:.5rem"><b>${add.length}</b> new partner/marketing/growth/BD ${add.length===1?'contact':'contacts'} at your Tier A/B targets${dupes.length?` · <b>${dupes.length}</b> already in your network (skipped)`:''}.</div>`;
  if(!add.length){html+='<div class="empty">No new matches — either none at your Tier A/B companies in a relevant role, or they\u2019re already contacts.</div>';$('#liResult').innerHTML=html;return;}
  html+='<div style="max-height:320px;overflow:auto;border:1px solid var(--line);border-radius:8px;padding:.5rem">';
  cos.forEach(co=>{html+=`<div style="font-family:'Hanken Grotesk',sans-serif;font-weight:700;margin:.45rem 0 .15rem">${esc(co)} <span class="subtle" style="font-weight:400">· ${byCo[co].length}</span></div>`;
    byCo[co].forEach(n=>{html+=`<div class="subtle" style="font-size:.82rem;padding-left:.5rem">${esc(n)}</div>`;});});
  html+='</div>';
  html+=`<button class="btn" style="width:100%;justify-content:center;margin-top:.6rem" onclick="commitLinkedIn()">✓ Add ${add.length} to Contacts</button>`;
  $('#liResult').innerHTML=html;
}
function commitLinkedIn(){
  const add=window._liAdd||[];if(!add.length)return;
  DB.contacts=DB.contacts.concat(add);saveDB();window._liAdd=null;
  const n=add.length;renderAll();
  if($('#liText'))$('#liText').value='';
  toast('✓ Added '+n+' contacts');
  if($('#liResult'))$('#liResult').innerHTML='<div class="empty">Added '+n+' contacts. Now hit <b>Push &amp; Pull</b> to sync them to your Sheet.</div>';
}
function liPickFile(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{if($('#liText'))$('#liText').value=r.result;importLinkedIn();ev.target.value='';};r.readAsText(f);}

/* ============================================================
   GLOBAL SEARCH  (Enter jumps to best match)
   ============================================================ */
$('#globalSearch').addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  const q=e.target.value.trim().toLowerCase();if(!q)return;
  const ctStart=DB.contacts.find(c=>(c.name||'').toLowerCase().startsWith(q));
  const coInc=DB.companies.find(c=>c.name.toLowerCase().includes(q));
  const ctInc=DB.contacts.find(c=>(c.name||'').toLowerCase().includes(q));
  const pInc=(DB.people||[]).find(p=>(p.name||'').toLowerCase().includes(q));
  if(ctStart){openContactFull(ctStart.id);e.target.blur();return;}
  if(coInc){openCompanyFull(coInc.id);e.target.blur();return;}
  if(ctInc){openContactFull(ctInc.id);e.target.blur();return;}
  if(pInc){openPersonFull(pInc.id);e.target.blur();return;}
  toast('No match for \u201c'+esc(e.target.value)+'\u201d');
});

/* ============================================================
   BOOT
   ============================================================ */
function routeHash(){
  const h=location.hash.replace(/^#/,'');
  if(h.startsWith('company/')){const id=h.slice(8);if(company(id)){showFull('company',id);return true;}}
  if(h.startsWith('contact/')){const id=h.slice(8);if(contact(id)){showFull('contact',id);return true;}}
  if(h.startsWith('person/')){const id=h.slice(7);if(person(id)){openPersonFull(id);return true;}}
  return false;
}
function boot(){
  loadDB();buildTabs();renderAll();Sync.paint();
  if(!routeHash()) goTab('week');
  window.addEventListener('hashchange',()=>{ if(!location.hash) return; routeHash(); });
  if(Sync.url())Sync.pull();
}
boot();
</script>
