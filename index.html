<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Networking HQ — Ross Yader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4F3EF; --surface:#FFFFFF; --surface2:#FAF9F6;
  --ink:#17161A; --muted:#6E6B76; --faint:#9A97A2;
  --line:#E7E5DE; --line2:#EFEDE7;
  --accent:#2750E8; --accent-soft:#EAEEFE; --accent-ink:#1B38A8;
  --green:#15803D; --green-bg:#DCFCE7;
  --amber:#B45309; --amber-bg:#FEF3C7;
  --red:#B91C1C; --red-bg:#FEE2E2;
  --slate:#475569; --slate-bg:#EEF2F6;
  --r:12px; --r-sm:8px;
  --shadow:0 1px 2px rgba(20,18,30,.04),0 4px 16px rgba(20,18,30,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;-webkit-font-smoothing:antialiased}
.mono{font-family:'JetBrains Mono',monospace}
em{font-style:normal;color:var(--accent)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:.9rem;color:var(--ink)}
a{color:var(--accent);text-decoration:none}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:50;background:rgba(244,243,239,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:env(safe-area-inset-top) 0 0}
.hdr-in{display:flex;align-items:center;gap:1rem;padding:.7rem 1.1rem;max-width:1180px;margin:0 auto}
.brand{display:flex;flex-direction:column;line-height:1}
.brand h1{font-family:'Hanken Grotesk',sans-serif;font-size:1.05rem;font-weight:800;letter-spacing:-.02em}
.brand .sub{font-family:'JetBrains Mono',monospace;font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-top:.18rem}
.gsearch{flex:1;max-width:340px;position:relative;margin-left:auto}
.gsearch input{width:100%;padding:.46rem .7rem .46rem 2rem;border:1px solid var(--line);border-radius:99px;background:var(--surface);outline:none;font-size:.85rem;transition:border .15s,box-shadow .15s}
.gsearch input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.gsearch .ic{position:absolute;left:.7rem;top:50%;transform:translateY(-50%);color:var(--faint);font-size:.85rem}
#syncChip{display:flex;align-items:center;gap:.35rem;font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.04em;padding:.32rem .6rem;border:1px solid var(--line);border-radius:99px;color:var(--muted);background:var(--surface);white-space:nowrap}
#syncChip .dot{width:7px;height:7px;border-radius:99px;background:var(--faint)}
#syncChip.ok .dot{background:var(--green)} #syncChip.ok{color:var(--green)}
#syncChip.go .dot{background:var(--accent);animation:pulse 1s infinite} #syncChip.go{color:var(--accent)}
#syncChip.err .dot{background:var(--red)} #syncChip.err{color:var(--red)}
#syncChip.off .dot{background:var(--faint)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── TABS ── */
.tabs{position:sticky;top:calc(env(safe-area-inset-top) + 49px);z-index:49;background:var(--surface);border-bottom:1px solid var(--line);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tabs-in{display:flex;max-width:1180px;margin:0 auto;padding:0 .6rem}
.tab{font-family:'JetBrains Mono',monospace;font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;padding:.85rem .95rem;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s}
.tab:hover{color:var(--ink)}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

main{max-width:1180px;margin:0 auto;padding:1.2rem 1.1rem 5rem}
.panel{display:none}.panel.on{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ── GENERIC ── */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.sec-head{display:flex;align-items:baseline;gap:.6rem;margin:1.6rem 0 .7rem}
.sec-head h2{font-family:'Hanken Grotesk',sans-serif;font-size:1.05rem;font-weight:700;letter-spacing:-.01em}
.sec-head .ct{font-family:'JetBrains Mono',monospace;font-size:.66rem;color:var(--faint)}
.btn{display:inline-flex;align-items:center;gap:.4rem;background:var(--accent);color:#fff;padding:.5rem .9rem;border-radius:var(--r-sm);font-size:.82rem;font-weight:600;transition:filter .15s,transform .05s}
.btn:hover{filter:brightness(1.07)}.btn:active{transform:translateY(1px)}
.btn.ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line)}
.btn.ghost:hover{border-color:var(--ink);filter:none}
.btn.sm{padding:.32rem .6rem;font-size:.74rem}
.chip{display:inline-flex;align-items:center;gap:.3rem;font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.03em;padding:.2rem .5rem;border-radius:99px;border:1px solid var(--line);color:var(--muted);background:var(--surface2);white-space:nowrap}
.chip.tierA{background:var(--accent-soft);color:var(--accent-ink);border-color:transparent;font-weight:600}
.chip.tierB{background:var(--slate-bg);color:var(--slate);border-color:transparent}
.chip.tierC{background:#F3F1EC;color:var(--faint);border-color:transparent}
.chip.green{background:var(--green-bg);color:var(--green);border-color:transparent}
.chip.amber{background:var(--amber-bg);color:var(--amber);border-color:transparent}
.chip.red{background:var(--red-bg);color:var(--red);border-color:transparent}
.chip.slate{background:var(--slate-bg);color:var(--slate);border-color:transparent}
.chip.accent{background:var(--accent-soft);color:var(--accent-ink);border-color:transparent}
.empty{color:var(--muted);font-size:.85rem;padding:1.4rem;text-align:center;border:1px dashed var(--line);border-radius:var(--r);background:var(--surface2)}
.row-actions{display:flex;gap:.4rem;flex-wrap:wrap}

/* ── DASHBOARD ── */
.brief{background:linear-gradient(135deg,#1B1A20 0%,#262430 100%);color:#fff;border-radius:var(--r);padding:1.3rem 1.3rem 1.2rem;position:relative;overflow:hidden}
.brief::after{content:"";position:absolute;right:-40px;top:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(39,80,232,.4),transparent 70%);pointer-events:none}
.brief .eyebrow{color:rgba(255,255,255,.55)}
.brief h2{font-family:'Hanken Grotesk',sans-serif;font-size:1.5rem;font-weight:800;letter-spacing:-.02em;margin:.25rem 0 .5rem;position:relative;z-index:1}
.brief .focus{font-size:.95rem;color:rgba(255,255,255,.82);max-width:60ch;position:relative;z-index:1}
.brief-edit{position:absolute;top:1rem;right:1rem;z-index:2;color:rgba(255,255,255,.6);font-size:.7rem;border:1px solid rgba(255,255,255,.25);border-radius:99px;padding:.25rem .55rem;font-family:'JetBrains Mono',monospace}
.brief-edit:hover{color:#fff;border-color:#fff}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:.7rem;margin-top:1rem;position:relative;z-index:1}
.kpi{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:var(--r-sm);padding:.6rem .7rem}
.kpi .n{font-family:'Hanken Grotesk',sans-serif;font-size:1.5rem;font-weight:800;line-height:1}
.kpi .l{font-family:'JetBrains Mono',monospace;font-size:.56rem;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-top:.25rem}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1rem}
.queue-item{display:flex;align-items:flex-start;gap:.6rem;padding:.6rem .2rem;border-bottom:1px solid var(--line2)}
.queue-item:last-child{border-bottom:none}
.qi-main{flex:1;min-width:0}
.qi-name{font-weight:600;font-size:.88rem}
.qi-meta{font-size:.74rem;color:var(--muted);margin-top:.1rem;overflow:hidden;text-overflow:ellipsis}
.qi-act{font-size:.7rem;color:var(--accent);font-weight:600;white-space:nowrap;cursor:pointer}
.plan-item{display:flex;gap:.6rem;align-items:flex-start;padding:.65rem .1rem;border-bottom:1px solid var(--line2)}
.plan-item:last-child{border-bottom:none}
.plan-item.done{opacity:.55}
.plan-item.done .qi-name{text-decoration:line-through}
.plan-reorder{display:flex;flex-direction:column;gap:3px;flex:0 0 auto;padding-top:2px}
.plan-reorder .mini{width:22px;height:17px;line-height:1;border:1px solid var(--line);background:var(--surface);border-radius:5px;cursor:pointer;font-size:.7rem;color:var(--muted);padding:0}
.plan-reorder .mini:hover{border-color:var(--accent);color:var(--accent)}
.plan-check{flex:0 0 auto;width:26px;height:26px;border-radius:50%;border:2px solid var(--accent);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.78rem;cursor:pointer;user-select:none;margin-top:1px}
.plan-check.on{background:var(--accent);color:#fff}
.plan-main{flex:1 1 auto;min-width:0}
.plan-actions{display:flex;flex-wrap:wrap;gap:.4rem;align-items:center;margin-top:.4rem}
.sugg-h{font-family:'Hanken Grotesk',sans-serif;font-weight:700;font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);margin:.7rem 0 .15rem}
.card-pad{padding:1rem 1.1rem}
.card-pad h3{font-family:'Hanken Grotesk',sans-serif;font-size:.95rem;font-weight:700;margin-bottom:.5rem;display:flex;justify-content:space-between;align-items:center}
.card-pad h3 .ct{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--faint);font-weight:400}

/* goals */
.goal{display:flex;align-items:center;gap:.6rem;padding:.45rem .2rem;border-bottom:1px solid var(--line2)}
.goal:last-child{border-bottom:none}
.goal .box{width:18px;height:18px;border:1.5px solid var(--line);border-radius:5px;flex-shrink:0;cursor:pointer;display:grid;place-items:center;color:#fff;transition:all .12s}
.goal.done .box{background:var(--green);border-color:var(--green)}
.goal.done .gt{text-decoration:line-through;color:var(--faint)}
.goal .gt{flex:1;font-size:.86rem}
.goal .del{color:var(--faint);font-size:.9rem;opacity:0;transition:opacity .12s}
.goal:hover .del{opacity:1}
.goal-add{display:flex;gap:.5rem;margin-top:.6rem}
.goal-add input{flex:1;padding:.45rem .6rem;border:1px solid var(--line);border-radius:var(--r-sm);outline:none}
.goal-add input:focus{border-color:var(--accent)}

/* ── COMPANIES ── */
.ctrlbar{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;margin-bottom:1rem}
.filterset{display:flex;gap:.35rem;flex-wrap:wrap}
.fb{font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.03em;padding:.34rem .6rem;border:1px solid var(--line);border-radius:99px;color:var(--muted);background:var(--surface);transition:all .12s}
.fb:hover{border-color:var(--ink);color:var(--ink)}
.fb.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.searchbox{flex:1;min-width:160px;max-width:300px;position:relative}
.searchbox input{width:100%;padding:.46rem .7rem .46rem 2rem;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--surface);outline:none}
.searchbox input:focus{border-color:var(--accent)}
.searchbox .ic{position:absolute;left:.65rem;top:50%;transform:translateY(-50%);color:var(--faint)}
.co-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:.9rem}
.co-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:1rem 1.05rem;cursor:pointer;transition:border-color .15s,box-shadow .15s,transform .05s;display:flex;flex-direction:column;gap:.55rem}
.co-card.draggable .co-name{cursor:grab}
.co-card.dragging{opacity:.4}
.co-card.drop-before{box-shadow:inset 0 4px 0 -1px var(--accent)}
.co-card.drop-after{box-shadow:inset 0 -4px 0 -1px var(--accent)}
.co-grip{color:var(--faint);font-size:1rem;cursor:grab;user-select:none;letter-spacing:-2px}
.co-mv{font-size:.8rem;line-height:1;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:.18rem .35rem;background:var(--surface2)}
.co-mv:hover{border-color:var(--accent);color:var(--accent)}
.board-bar{display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;margin:-.2rem 0 1rem}
.board-hint{font-size:.78rem;color:var(--muted)}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:99px;overflow:hidden;background:var(--surface)}
.seg-b{font-family:'JetBrains Mono',monospace;font-size:.66rem;letter-spacing:.04em;padding:.35rem .7rem;color:var(--muted)}
.seg-b.on{background:var(--ink);color:#fff}
.metric-edit{font-family:'Hanken Grotesk',sans-serif;font-weight:700;font-size:1.15rem;width:3.2rem;text-align:center;border:1px solid var(--line);border-radius:8px;padding:.15rem .2rem;background:var(--surface);color:var(--ink)}
.metric-edit:focus{outline:none;border-color:var(--accent);background:#fff}
.metric-edit::-webkit-outer-spin-button,.metric-edit::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.board-lbl{font-family:'JetBrains Mono',monospace;font-size:.64rem;letter-spacing:.08em;text-transform:uppercase;color:var(--faint)}
.grip-cell{white-space:nowrap;width:1px;padding-right:.2rem!important}
.c-grip{cursor:grab;color:var(--faint);font-size:1rem;letter-spacing:-2px;user-select:none;padding:.2rem;display:inline-block;vertical-align:middle}
.c-grip:active{cursor:grabbing}
.c-mvs{display:inline-flex;gap:.2rem;vertical-align:middle;margin-left:.15rem}
tr.dragging{opacity:.4}
tr.drop-before td{box-shadow:inset 0 3px 0 -1px var(--accent)}
tr.drop-after td{box-shadow:inset 0 -3px 0 -1px var(--accent)}
.dt-modal{position:fixed;inset:0;z-index:120;display:grid;place-items:center}
.dt-scrim{position:absolute;inset:0;background:rgba(20,22,28,.45)}
.dt-card{position:relative;z-index:1;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:1.2rem 1.3rem;width:min(360px,92vw)}
.dt-h{font-family:'Hanken Grotesk',sans-serif;font-weight:700;font-size:1.05rem;margin-bottom:.9rem}
.dt-card .field{margin-bottom:.7rem}
.dt-card .field input{width:100%;padding:.55rem .7rem;border:1px solid var(--line);border-radius:var(--r-sm);outline:none;font-family:'Inter',sans-serif;font-size:.95rem}
.dt-card .field input:focus{border-color:var(--accent)}
.dt-allday{display:flex;align-items:center;gap:.5rem;font-size:.86rem;color:var(--muted);margin:.1rem 0 1rem;cursor:pointer}
.dt-allday input{width:auto}
.dt-actions{display:flex;justify-content:flex-end;gap:.5rem}
.mode-tabs{display:flex;gap:.5rem;margin-bottom:1rem}
.mode-b{display:inline-flex;align-items:center;gap:.45rem;font-family:'Hanken Grotesk',sans-serif;font-weight:600;font-size:.92rem;padding:.5rem .9rem;border:1px solid var(--line);border-radius:99px;background:var(--surface);color:var(--muted)}
.mode-b.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.mode-ct{font-family:'JetBrains Mono',monospace;font-size:.66rem;padding:.05rem .4rem;border-radius:99px;background:var(--surface2);color:var(--muted)}
.mode-b.on .mode-ct{background:rgba(255,255,255,.2);color:#fff}
.co-card:hover{border-color:var(--accent);box-shadow:var(--shadow)}
.co-card:active{transform:translateY(1px)}
.co-top{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem}
.co-name{font-family:'Hanken Grotesk',sans-serif;font-size:1.08rem;font-weight:700;letter-spacing:-.01em}
.co-cat{font-size:.74rem;color:var(--muted);margin-top:.1rem}
.co-chips{display:flex;gap:.35rem;flex-wrap:wrap}
.co-stats{display:flex;gap:1.1rem;padding-top:.5rem;border-top:1px solid var(--line2)}
.co-stat .n{font-family:'Hanken Grotesk',sans-serif;font-weight:700;font-size:1rem}
.co-stat .l{font-family:'JetBrains Mono',monospace;font-size:.54rem;letter-spacing:.05em;text-transform:uppercase;color:var(--faint)}
.co-next{font-size:.78rem;color:var(--muted);border-radius:6px;margin:-.15rem;padding:.15rem .25rem;cursor:text}
.co-next:hover{background:var(--surface2)}
.co-next.editing:hover{background:transparent}
.next-empty{color:var(--accent);font-weight:600;opacity:.8}
.next-edit{width:100%;font-family:'Inter',sans-serif;font-size:.78rem;border:1px solid var(--accent);border-radius:6px;padding:.3rem .4rem;outline:none;background:#fff;color:var(--ink)}
.co-next b{color:var(--ink);font-weight:600}

/* ── DRAWER ── */
.scrim{position:fixed;inset:0;background:rgba(20,18,26,.45);backdrop-filter:blur(2px);z-index:80;opacity:0;pointer-events:none;transition:opacity .2s}
.scrim.on{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100dvh;width:min(560px,100%);background:var(--bg);z-index:81;transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);overflow-y:auto;box-shadow:-8px 0 30px rgba(20,18,26,.18);overscroll-behavior:contain}
.drawer.on{transform:none}
.dr-head{position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--line);padding:1rem 1.2rem;display:flex;align-items:flex-start;gap:.6rem;z-index:2}
.dr-close{font-size:1.3rem;color:var(--muted);line-height:1;padding:.1rem .3rem}
.dr-close:hover{color:var(--ink)}
.dr-body{padding:1.1rem 1.2rem 3rem}
.dr-title{font-family:'Hanken Grotesk',sans-serif;font-size:1.4rem;font-weight:800;letter-spacing:-.02em;line-height:1.1}
.dr-sub{font-size:.82rem;color:var(--muted);margin-top:.2rem}
.dr-sec{margin-top:1.4rem}
.dr-sec-h{font-family:'JetBrains Mono',monospace;font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:.6rem;display:flex;justify-content:space-between;align-items:center}
.metric-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-top:.6rem}
.metric{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:.6rem .7rem}
.metric .n{font-family:'Hanken Grotesk',sans-serif;font-weight:700;font-size:1.15rem}
.metric .l{font-family:'JetBrains Mono',monospace;font-size:.54rem;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);margin-top:.15rem}

/* person rows */
.person{display:flex;align-items:center;gap:.7rem;padding:.6rem .7rem;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);margin-bottom:.5rem}
.person .av{width:34px;height:34px;border-radius:99px;background:var(--accent-soft);color:var(--accent-ink);display:grid;place-items:center;font-weight:700;font-size:.8rem;flex-shrink:0;font-family:'Hanken Grotesk',sans-serif}
.person .pm{flex:1;min-width:0}
.person .pn{font-weight:600;font-size:.88rem;display:flex;align-items:center;gap:.4rem;flex-wrap:wrap}
.person .pt{font-size:.74rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.person .px{display:flex;flex-direction:column;align-items:flex-end;gap:.25rem}
.dot-str{width:8px;height:8px;border-radius:99px;display:inline-block}
.str-Strong{background:var(--green)} .str-Medium{background:var(--amber)} .str-Weak{background:var(--slate)} .str-Unknown{background:var(--faint)}

.target-row{display:flex;align-items:center;gap:.6rem;padding:.55rem .7rem;border:1px solid var(--line);border-radius:var(--r-sm);margin-bottom:.5rem;background:var(--surface)}
.target-row .rank{font-family:'Hanken Grotesk',sans-serif;font-weight:800;color:var(--faint);font-size:.95rem;width:1.2rem;text-align:center}
.reach-known{color:var(--green)} .reach-warm-intro{color:var(--accent)} .reach-recruiter{color:var(--amber)} .reach-cold{color:var(--slate)}

textarea.ta{width:100%;min-height:90px;padding:.6rem .7rem;border:1px solid var(--line);border-radius:var(--r-sm);outline:none;resize:vertical;font-size:.85rem;line-height:1.5}
textarea.ta:focus{border-color:var(--accent)}
.field{margin-bottom:.7rem}
.field label{display:block;font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:.25rem}
.field input,.field select,.field textarea{width:100%;padding:.5rem .6rem;border:1px solid var(--line);border-radius:var(--r-sm);outline:none;background:var(--surface)}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}

/* contacts table */
.tbl{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.tbl th{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);text-align:left;padding:.6rem .8rem;border-bottom:1px solid var(--line);cursor:pointer;white-space:nowrap;background:var(--surface2)}
.tbl td{padding:.6rem .8rem;border-bottom:1px solid var(--line2);font-size:.85rem;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr.clickable:hover{background:var(--accent-soft);cursor:pointer}
.tbl .nm{font-weight:600}
@media(max-width:680px){
  .tbl thead{display:none}
  .tbl,.tbl tbody,.tbl tr,.tbl td{display:block;width:100%}
  .tbl tr{border:1px solid var(--line);border-radius:var(--r-sm);margin-bottom:.6rem;padding:.4rem .2rem}
  .tbl td{border:none;padding:.25rem .8rem}
  .tbl td::before{content:attr(data-l);font-family:'JetBrains Mono',monospace;font-size:.55rem;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);display:block}
}

.toast{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%) translateY(120%);background:var(--ink);color:#fff;padding:.7rem 1.1rem;border-radius:99px;font-size:.85rem;z-index:200;transition:transform .25s;box-shadow:0 8px 24px rgba(0,0,0,.25);max-width:90vw}
.toast.on{transform:translateX(-50%) translateY(0)}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:99px;display:inline-block;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:780px){
  .dash-grid{grid-template-columns:1fr}
  .kpis{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:520px){
  .gsearch{display:none}
  .co-grid{grid-template-columns:1fr}
}
.linkout{font-size:.7rem;color:var(--muted)}
.linkout:hover{color:var(--accent)}
.subtle{color:var(--muted);font-size:.8rem}
hr.div{border:none;border-top:1px solid var(--line);margin:1rem 0}
.pill-tabs{display:flex;gap:.3rem;background:var(--surface2);border:1px solid var(--line);border-radius:99px;padding:.2rem;margin-bottom:.8rem;width:fit-content}
.pill-tabs button{font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.04em;text-transform:uppercase;padding:.35rem .7rem;border-radius:99px;color:var(--muted)}
.pill-tabs button.on{background:var(--ink);color:#fff}

/* ── FULL VIEW (company / contact home page) ── */
.fv-back{display:inline-flex;align-items:center;gap:.4rem;font-family:'JetBrains Mono',monospace;font-size:.66rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem}
.fv-back:hover{color:var(--accent)}
.fv-head{display:flex;align-items:flex-start;gap:1rem;flex-wrap:wrap}
.fv-title{font-family:'Hanken Grotesk',sans-serif;font-size:2rem;font-weight:800;letter-spacing:-.02em;line-height:1.05}
.fv-sub{color:var(--muted);font-size:.92rem;margin-top:.25rem}
.fv-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1.2rem;align-items:start}
.fv-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:1.1rem 1.2rem;box-shadow:var(--shadow)}
.fv-card h3{font-family:'JetBrains Mono',monospace;font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:.7rem;display:flex;justify-content:space-between;align-items:center}
.fv-card.full{grid-column:1 / -1}
@media(max-width:780px){.fv-grid{grid-template-columns:1fr}}

/* inline editable select/field */
.inline-sel{font-family:'Inter',sans-serif;font-size:.78rem;border:1px solid transparent;border-radius:6px;padding:.2rem .4rem;background:var(--surface2);color:var(--ink);cursor:pointer;max-width:100%}
.inline-sel:hover{border-color:var(--line)}
.inline-sel:focus{border-color:var(--accent);outline:none;background:#fff}
.editbtn{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);border:1px solid var(--accent-soft);background:var(--accent-soft);border-radius:6px;padding:.25rem .55rem}
.editbtn:hover{background:var(--accent);color:#fff}
.readrow{display:flex;justify-content:space-between;gap:.6rem;padding:.4rem 0;border-bottom:1px solid var(--line2);font-size:.86rem}
.readrow:last-child{border-bottom:none}
.readrow .k{color:var(--muted);font-size:.78rem}
.readrow .v{font-weight:500;text-align:right}

/* autocomplete */
.ac-wrap{position:relative}
.ac-list{position:absolute;left:0;right:0;top:100%;background:#fff;border:1px solid var(--line);border-radius:var(--r-sm);box-shadow:var(--shadow);z-index:20;max-height:220px;overflow-y:auto;margin-top:2px}
.ac-item{padding:.5rem .7rem;cursor:pointer;font-size:.84rem;border-bottom:1px solid var(--line2)}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.sel{background:var(--accent-soft)}
.ac-item .acn{font-weight:600}
.ac-item .act{font-size:.74rem;color:var(--muted)}
.ac-add{color:var(--accent);font-weight:600}

/* undo toast */
.toast.undo{padding-right:.5rem}
.toast .undo-btn{margin-left:.7rem;color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:99px;padding:.15rem .6rem;font-size:.78rem;font-weight:600}
.toast .undo-btn:hover{background:rgba(255,255,255,.15)}

/* job import + role rows */
.import-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:1rem 1.1rem;margin-bottom:1.1rem;box-shadow:var(--shadow)}
.import-card h3{font-family:'Hanken Grotesk',sans-serif;font-size:1rem;font-weight:700;margin-bottom:.5rem}
.import-row{display:flex;gap:.5rem;flex-wrap:wrap}
.import-row input{flex:1;min-width:200px;padding:.55rem .7rem;border:1px solid var(--line);border-radius:var(--r-sm);outline:none}
.import-row input:focus{border-color:var(--accent)}
.stage-sel{font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.02em;border:1px solid var(--line);border-radius:99px;padding:.28rem .5rem;background:var(--surface2);cursor:pointer}
.stage-sel:focus{outline:none;border-color:var(--accent)}
.parsed-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-top:.7rem}
@media(max-width:680px){.parsed-grid{grid-template-columns:1fr}}
</style>
</head>

/* ---------- fixed vocabularies ---------- */
const CONTACT_STATUS = ['New','Reaching out','Active','Nurture','Activated','Dormant','Do not pursue'];
const NEXT_STEPS = ['Check in','Schedule call','Call scheduled','Send update','Ask for intro','Wait for reply','Nothing right now','Other…'];
const PEOPLE_STAGES = ['Identified','Need a path','Intro requested','Intro made','In conversation','Building','Parked'];
const PEOPLE_ACTIVE = ['Need a path','Intro requested','Intro made','In conversation'];
const JOB_STAGES = ['Found','Researching','Networking in','Referral secured','Recruiter screen','Hiring manager','Onsite/Panel','Offer','Closed','Not a fit'];
const JOB_CLOSED = ['Closed','Not a fit'];
const COMPANY_STATUS = ['Target','Researching','Warm Path','Active Conversation','Recruiter Screen','Interviewing','Post-Interview','Offer','Stay in Touch','Network Only','Passed / Closed'];
const CO_STATUS_MIGRATE = {'':'Target','Post-interview':'Post-Interview','Recruiter Call':'Recruiter Screen','In Process':'Interviewing','Not a fit':'Passed / Closed','Closed':'Passed / Closed'};
function migrateCoStatus(co){if(!co)return;if(CO_STATUS_MIGRATE[co.status]!==undefined)co.status=CO_STATUS_MIGRATE[co.status];if(!COMPANY_STATUS.includes(co.status))co.status='Target';}
const PLAN_ACTIONS = ['Check in','Reconnect','Send update','Schedule call','Ask for intro'];
const JOB_INTERVIEWING = ['Recruiter screen','Hiring manager','Onsite/Panel'];

/* map legacy free-text → fixed stages (run once on load) */
function migrateStatus(c){
  const s=(c.status||'').toLowerCase();
  if(CONTACT_STATUS.includes(c.status))return; // already migrated
  let m='Active';
  if(/not contacted|^$|networking hq.*not|^new/.test(s))m='New';
  else if(/outreach|reach|follow-?up sent|initial/.test(s))m='Reaching out';
  else if(/nurture|watch/.test(s))m='Nurture';
  else if(/activated|intro|referr/.test(s))m='Activated';
  else if(/dormant|cold|stale/.test(s))m='Dormant';
  else if(/not pursuing|do not|declin/.test(s))m='Do not pursue';
  else if(/active|relationship|met|connected|meeting|scheduled|conversation/.test(s))m='Active';
  else if(/networking hq/.test(s))m='Nurture';
  c.status=m;
  if(c.nextStep && !NEXT_STEPS.includes(c.nextStep)){
    const n=(c.nextStep||'').toLowerCase();
    if(/schedule|prepare for call/.test(n))c.nextStep='Schedule call';
    else if(/follow-?up|message|reconnect/.test(n))c.nextStep='Check in';
    else if(/update|share/.test(n))c.nextStep='Send update';
    else if(/referral|intro/.test(n))c.nextStep='Ask for intro';
    else if(/wait/.test(n))c.nextStep='Wait for reply';
    else if(/no action|nothing/.test(n))c.nextStep='Nothing right now';
    else { c.nextStepOther=c.nextStep; c.nextStep='Other…'; }
  }
}
function migrateJob(j){
  if(JOB_STAGES.includes(j.status))return;
  const s=(j.status||'').toLowerCase();
  let m='Found';
  if(/reject|closed|not a fit|pass/.test(s))m='Closed';
  else if(/offer/.test(s))m='Offer';
  else if(/onsite|panel|interview/.test(s))m='Onsite/Panel';
  else if(/hiring manager/.test(s))m='Hiring manager';
  else if(/recruiter/.test(s))m='Recruiter screen';
  else if(/applied|referr/.test(s))m='Referral secured';
  else if(/watch|monitor/.test(s))m='Researching';
  else if(/open|found/.test(s))m='Found';
  j.status=m;
}

/* status → chip class */
function statusChip(s){
  s=(s||'').toLowerCase();
  if(/activated|offer/.test(s))return 'green';
  if(/active|networking in|referral secured/.test(s))return 'accent';
  if(/interview|recruiter|hiring|onsite|panel|reaching out|researching/.test(s))return 'amber';
  if(/do not pursue|not a fit|closed|reject|dormant/.test(s))return 'red';
  if(/nurture/.test(s))return 'slate';
  return 'slate';
}

const Sync = {
  url(){return localStorage.getItem(LS_SYNC)||'';},
  setUrl(u){u=(u||'').trim();if(u)localStorage.setItem(LS_SYNC,u);else localStorage.removeItem(LS_SYNC);this.paint();},
  paint(){
    const chip=$('#syncChip'),lbl=$('#syncLbl');
    if(!this.url()){chip.className='off';lbl.textContent='Local only';return;}
    chip.className='ok';lbl.textContent='Synced';
  },
  setState(state,text){const chip=$('#syncChip');chip.className=state;$('#syncLbl').textContent=text;},
  async pull(){
    if(!this.url())return false;
    this.setState('go','Pulling…');
    try{
      const r=await fetch(this.url()+(this.url().includes('?')?'&':'?')+'action=read&t='+Date.now());
      const j=await r.json();
      if(j && (j.contacts||j.companies)){
        // remote wins if it has data and is newer (last-write-wins on whole doc)
        const remoteUpdated=j.updated||'';
        const localUpdated=DB.updated||'';
        if(!localUpdated || remoteUpdated>=localUpdated || (DB.contacts.length===0)){
          DB=j;loadDBdefaults();saveDB(false);renderAll();
          this.setState('ok','Synced');toast('↓ Pulled latest from Sheets');return true;
        }
      }
      this.setState('ok','Synced');return false;
    }catch(e){console.warn(e);this.setState('err','Sync error');return false;}
  },
  async push(){
    if(!this.url())return;
    this.setState('go','Saving…');
    try{
      await fetch(this.url(),{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
        body:JSON.stringify({action:'write',data:DB})});
      this.setState('ok','Synced');
    }catch(e){console.warn(e);this.setState('err','Sync error');}
  },
  async now(){ if(!this.url()){goTab('settings');toast('Add your Apps Script URL in Settings to sync');return;} await this.push(); await this.pull(); }
};
function loadDBdefaults(){
  DB.contacts=DB.contacts||[]; DB.companies=DB.companies||[]; DB.jobs=DB.jobs||[];
  DB.weekly=DB.weekly||{weekOf:today(),focus:'',goals:[],outreachQueue:[]};

}

/* ============================================================
   ANTHROPIC (research extraction — uses your own key)
   ============================================================ */
const AI = {
  key(){return localStorage.getItem(LS_KEY)||'';},
  model(){return localStorage.getItem(LS_MODEL)||'claude-sonnet-4-6';},
  async call(messages,maxTokens=1500){
    if(!this.key())throw new Error('no-key');
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'content-type':'application/json','x-api-key':this.key(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:this.model(),max_tokens:maxTokens,messages})
    });
    if(!r.ok){const t=await r.text();throw new Error('api '+r.status+': '+t.slice(0,200));}
    const j=await r.json();
    return (j.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
  },
  parseJSON(txt){
    let t=(txt||'').replace(/```json|```/g,'').trim();
    const a=t.indexOf('['),b=t.lastIndexOf(']');
    if(a>=0&&b>a)t=t.slice(a,b+1);
    return JSON.parse(t);
  },
  // extract target people from pasted LinkedIn text or a screenshot, for a given company
  async extractPeople({text,image,coName}){
    const sys=`You extract professional contacts from messy LinkedIn text or screenshots for a job seeker mapping who to talk to at "${coName}". Return ONLY a JSON array. Each item: {"name","title","seniority","note"}. seniority must be one of: "C-Level / Founder","SVP / EVP","VP","Sr. Director","Head / GM","Director","Lead / Principal","Manager","Recruiter / Talent","IC / Other". Prioritize marketing, growth, partnerships, and recruiting people. Skip anyone clearly unrelated. If nothing found, return [].`;
    const content=[];
    if(image)content.push({type:'image',source:image});
    content.push({type:'text',text:(text? text+'\n\n':'')+'Extract the relevant people as JSON now. No prose.'});
    const out=await this.call([{role:'user',content:[{type:'text',text:sys}]},{role:'assistant',content:'Understood. I will return only a JSON array.'},{role:'user',content}],2000);
    return this.parseJSON(out);
  },
  async draftMessage(c,co,opts){
    opts=opts||{};
    const action=opts.action||c.nextStep;
    const days=daysAgo(c.lastTouch);
    const recency = days!=null ? `Last spoke ${days} days ago.` : 'No recent contact logged.';
    const reasonMap={'Check in':'check in and see if they\u2019ve heard of anything','Reconnect':'reconnect after a while \u2014 it has been some time since they last spoke \u2014 and see if anything new has come up on their end. No hard ask; just getting back on their radar.','Schedule call':'set up a quick catch-up call','Send update':'share a brief update on his search','Ask for intro':'ask if they could make an introduction','Wait for reply':'gently follow up'};
    const reason = reasonMap[action] || (co? 'learn about '+co.name+' and who to talk to about a '+(co.targetFunction||'partner marketing')+' role' : 'reconnect and explore fit');
    const ctx=`Write a short, authentic LinkedIn/email outreach from Ross Yader (17+ yrs performance & partner marketing leader, targeting Director/Head partner-marketing roles at fintech/B2C growth companies) to:\nName: ${c.name}\nTitle: ${c.title}\nCompany: ${c.company}\nRelationship: ${c.strength} tie, ${c.roleType}. ${recency}\nReason for reaching out now: ${reason}.\nKeep it 3-5 sentences, warm, specific, sounds like a real person, no buzzwords, no "I hope this finds you well". Plain text only.`;
    return (await this.call([{role:'user',content:[{type:'text',text:ctx}]}],600)).trim();
  },
  async draftIntro(connector,target){
    const ctx=`Write a short, warm, authentic note from Ross Yader (17+ years in performance & partner marketing, currently exploring senior partner/performance-marketing roles) to ${connector.name}${connector.title?' ('+connector.title+')':''}, asking ${connector.name.split(' ')[0]} to introduce him to ${target.name}${target.title?', '+target.title:''}${target.company?' at '+target.company:''}.\n`+
      (target.why?`Why Ross wants to meet them: ${target.why}\n`:'')+
      `Ross's relationship with ${connector.name.split(' ')[0]}: ${connector.strength||'Unknown'} tie${connector.notes?'. Context: '+connector.notes:''}.\n`+
      `Make it genuinely easy to say yes and to forward. 3-5 sentences. End with one crisp, forwardable line about Ross that ${connector.name.split(' ')[0]} could paste straight to ${target.name.split(' ')[0]}. Warm and specific, sounds like a real person, no buzzwords, no "I hope this finds you well". Plain text only.`;
    return (await this.call([{role:'user',content:[{type:'text',text:ctx}]}],700)).trim();
  },
  async fetchPage(url){
    const proxies=[u=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u), u=>'https://corsproxy.io/?url='+encodeURIComponent(u)];
    let lastErr;
    for(const p of proxies){
      try{const r=await fetch(p(url));if(r.ok){const t=await r.text();if(t&&t.length>200)return t;}}catch(e){lastErr=e;}
    }
    throw new Error('Could not fetch that URL (site may block bots). Paste the job text instead.');
  },
  async parseJob({url,text}){
    let body=text;
    if(!body && url){const html=await this.fetchPage(url);body=html.replace(/<script[\s\S]*?<\/script>/gi,' ').replace(/<style[\s\S]*?<\/style>/gi,' ').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').slice(0,12000);}
    const sys=`Extract structured fields from this job posting (often Greenhouse or Lever). Return ONLY a JSON object: {"company","title","level","comp","location","remote","function","snippet"}. Rules: "level" = seniority like Manager / Lead / Director / Sr Director / VP. "comp" = salary range EXACTLY as stated, or "" if not listed (never guess). "remote" = Remote / Hybrid / Onsite / "". "function" = team area (e.g. Partner Marketing, Growth). "snippet" = one sentence on what the role does. Use "" for anything missing.`;
    const out=await this.call([{role:'user',content:[{type:'text',text:sys+'\n\nPOSTING:\n'+(body||'')+'\n\nReturn the JSON object only.'}]}],900);
    let t=(out||'').replace(/```json|```/g,'').trim();const a=t.indexOf('{'),b=t.lastIndexOf('}');if(a>=0&&b>a)t=t.slice(a,b+1);
    return JSON.parse(t);
  },
  async parseContact({image,text}){
    const sys=`Extract a SINGLE professional contact from this LinkedIn profile (screenshot or pasted text) for a job-seeker's networking CRM. Return ONLY a JSON object: {"name","title","company","roleType","seniority","note","location"}. Rules: "roleType" must be one of: "Referral Source","Connector","Recruiter","Hiring Manager","Peer","Consulting Prospect","Agency","Founder","Unclassified" — infer from their title (e.g. a talent/recruiting title => Recruiter; a senior marketing leader => Hiring Manager or Peer; an agency/consultant => Agency). "seniority" one of: "C-Level / Founder","SVP / EVP","VP","Sr. Director","Head / GM","Director","Lead / Principal","Manager","Recruiter / Talent","IC / Other". "note" = one short, factual sentence of useful context (their focus area or background) — no flattery, no invented facts. Use "" for anything not visible.`;
    const content=[];
    if(image)content.push({type:'image',source:image});
    content.push({type:'text',text:(text? 'PROFILE TEXT:\n'+text+'\n\n':'')+'Return the JSON object only.'});
    const out=await this.call([{role:'user',content:[{type:'text',text:sys}]},{role:'assistant',content:'Understood. I will return only a JSON object.'},{role:'user',content}],900);
    let t=(out||'').replace(/```json|```/g,'').trim();const a=t.indexOf('{'),b=t.lastIndexOf('}');if(a>=0&&b>a)t=t.slice(a,b+1);
    return JSON.parse(t);
  }
};

function dueContacts(){return DB.contacts.filter(c=>c.nextTouch && c.nextTouch<=today() && c.status!=='Do not pursue').sort((a,b)=>(a.nextTouch||'').localeCompare(b.nextTouch||''));}
function callsInPlay(){return DB.contacts.filter(c=>c.nextStep==='Schedule call'||c.nextStep==='Call scheduled').sort((a,b)=>{
  const aS=a.nextStep==='Call scheduled'?0:1, bS=b.nextStep==='Call scheduled'?0:1;
  if(aS!==bS)return aS-bS; // scheduled (with a date) first
  return (a.callDate||'9999').localeCompare(b.callDate||'9999');
});}
function upcomingCalls(){return DB.contacts.filter(c=>c.nextStep==='Call scheduled'&&c.callDate).sort((a,b)=>(a.callDate||'').localeCompare(b.callDate||''));}
function callsToSchedule(){return DB.contacts.filter(c=>c.nextStep==='Schedule call');}
function relDay(d){
  if(!d)return '';
  const diff=Math.round((new Date(d+'T00:00:00')-new Date(today()+'T00:00:00'))/86400000);
  if(diff===0)return 'Today';
  if(diff===1)return 'Tomorrow';
  if(diff===-1)return 'Yesterday';
  if(diff>1&&diff<=21)return 'in '+diff+' days';
  if(diff<-1)return Math.abs(diff)+'d ago';
  return fmtDate(d);
}
function callRow(c){
  const past=c.callDate&&c.callDate<today();
  const when=relDay(c.callDate)+(c.callTime?' · '+fmtTime(c.callTime):'');
  return `<div class="queue-item">
    <div class="qi-main" onclick="openContact('${c.id}')" style="cursor:pointer">
      <div class="qi-name">${esc(c.name)} <span class="subtle">· ${esc(c.company)}</span></div>

    </div>

  </div>`;
}
function outreachQueue(){return DB.contacts.filter(c=>['Check in','Send update','Ask for intro'].includes(c.nextStep) || c.status==='Reaching out').sort((a,b)=>{
  const ad=a.nextTouch&&a.nextTouch<=today()?0:1, bd=b.nextTouch&&b.nextTouch<=today()?0:1;
  if(ad!==bd)return ad-bd;
  const o={Strong:0,Medium:1,Weak:2,Unknown:3};
  if((o[a.strength]??3)!==(o[b.strength]??3))return (o[a.strength]??3)-(o[b.strength]??3);
  return (a.lastTouch||'').localeCompare(b.lastTouch||'');
});}
function staleStrong(){return DB.contacts.filter(c=>c.strength==='Strong' && c.status!=='Do not pursue' && c.lastTouch && daysAgo(c.lastTouch)>30).sort((a,b)=>daysAgo(b.lastTouch)-daysAgo(a.lastTouch));}

    ${(!due.length&&!quiet.length)?'<div class="empty">Nothing surfacing right now — you\u2019re caught up. 🎉</div>':''}

      <h3>📅 Upcoming calls <span class="ct">${upCalls.length}</span></h3>
      <div>${upCalls.length?upCalls.slice(0,8).map(callRow).join(''):'<div class="empty">No calls booked. On a contact, set Next step → “Call scheduled” and add the date.</div>'}</div>

/* ---- Outreach plan + suggestions ---- */
function addDays(d,n){const x=new Date((d||today())+'T00:00:00');x.setDate(x.getDate()+n);return x.toISOString().slice(0,10);}
function inPlan(cid){return (DB.weekly.plan||[]).some(x=>x.cid===cid);}
function dueSoon(){const lim=addDays(today(),7);return DB.contacts.filter(c=>c.nextTouch && c.nextTouch<=lim && c.status!=='Do not pursue' && !inPlan(c.id)).sort((a,b)=>(a.nextTouch||'').localeCompare(b.nextTouch||''));}
function goneQuiet(){const lim=addDays(today(),7);return DB.contacts.filter(c=>c.lastTouch && daysAgo(c.lastTouch)>=30 && c.status!=='Do not pursue' && !inPlan(c.id) && !(c.nextTouch && c.nextTouch<=lim)).sort((a,b)=>daysAgo(b.lastTouch)-daysAgo(a.lastTouch));}
function dueWhy(c){if(!c.nextTouch)return '';return c.nextTouch<today()?'overdue · '+relDay(c.nextTouch):'due '+relDay(c.nextTouch);}
function planDefaultAction(c){if(['Check in','Send update','Ask for intro','Schedule call'].includes(c.nextStep))return c.nextStep;if(c.lastTouch && daysAgo(c.lastTouch)>=30)return 'Reconnect';return 'Check in';}
function planAdd(cid,action){DB.weekly.plan=DB.weekly.plan||[];if(DB.weekly.plan.some(x=>x.cid===cid)){toast('Already in your plan');return;}const c=contact(cid);if(!c)return;DB.weekly.plan.push({id:uid('pl'),cid,action:action||planDefaultAction(c),done:false});saveDB();renderWeek();toast('Added to plan');}
function planRemove(id){DB.weekly.plan=(DB.weekly.plan||[]).filter(x=>x.id!==id);saveDB();renderWeek();}
function planMove(id,dir){const a=DB.weekly.plan||[];const i=a.findIndex(x=>x.id===id);if(i<0)return;if(dir==='top'){if(i===0)return;const it=a.splice(i,1)[0];a.unshift(it);}else if(dir==='up'){if(i===0)return;const t=a[i-1];a[i-1]=a[i];a[i]=t;}else if(dir==='down'){if(i>=a.length-1)return;const t=a[i+1];a[i+1]=a[i];a[i]=t;}saveDB();renderWeek();}
function planSetAction(id,v){const it=(DB.weekly.plan||[]).find(x=>x.id===id);if(it){it.action=v;saveDB();}}
function planToggleDone(id){const it=(DB.weekly.plan||[]).find(x=>x.id===id);if(!it)return;it.done=!it.done;if(it.done&&!it.logged){const c=contact(it.cid);if(c){c.touchpoints=c.touchpoints||[];c.touchpoints.push({date:today(),kind:'outreach',note:it.action||'Outreach'});c.lastTouch=today();c.nextTouch=addDays(today(),30);}it.logged=true;}saveDB();renderWeek();toast(it.done?'Logged ✓ — reminder set +30 days':'Marked not done');}
function clearDonePlan(){DB.weekly.plan=(DB.weekly.plan||[]).filter(x=>!x.done);saveDB();renderWeek();toast('Cleared completed');}
function planRow(it,i){

async function planDraft(id){

let coFilter='active', coSearch='', coSort='board', coRenderedIds=[];
function renderCompanies(){

    </div>

  </div>

    ${coSort==='board'?`<span class="board-hint">Drag a card to reorder — or use ⤒ / ↑ on each card. <button class="linkout" onclick="resetBoardOrder()">Reset to fit order</button></span>`:`<span class="board-hint">Showing algorithmic fit ranking. Switch to <b>My board</b> to hand-arrange.</span>`}
  </div>

function setCoSort(m){coSort=m;renderCompanies();}
function coMatches(co){
  if(co.archived && coFilter!=='archived' && coFilter!=='all')return false;
  if(coFilter==='archived'&&!co.archived)return false;
  const s=coSearch.trim().toLowerCase();
  if(s && !(co.name.toLowerCase().includes(s)||(co.category||'').toLowerCase().includes(s)||(co.targetFunction||'').toLowerCase().includes(s)))return false;
  if(coFilter==='active')return co.tier==='A'||co.tier==='B';
  if(coFilter==='A')return co.tier==='A';
  if(coFilter==='warm')return /warm|active|conversation|recruiter/i.test(co.status)||(co.warmPath||'').length>0;
  if(coFilter==='interview')return /interview/i.test(co.status);
  if(coFilter==='nocontacts')return (co.tier==='A'||co.tier==='B')&&contactsAt(co.name).length===0;
  return true;
}
/* ---- board ordering ---- */
function boardIndex(id){const i=(DB.boardOrder||[]).indexOf(id);return i<0?1e9:i;}
function fitCmp(a,b){const t={A:0,B:1,C:2};if(t[a.tier]!==t[b.tier])return (t[a.tier]??3)-(t[b.tier]??3);return (b.fitScore||0)-(a.fitScore||0);}
function boardCmp(a,b){const ia=boardIndex(a.id),ib=boardIndex(b.id);if(ia!==ib)return ia-ib;return fitCmp(a,b);}
function materializeOrder(){
  // write a dense, complete ordering of ALL companies in current board order
  DB.boardOrder=DB.companies.slice().sort(boardCmp).map(c=>c.id);
}
function placeBefore(id,beforeId){
  materializeOrder();let arr=DB.boardOrder.filter(x=>x!==id);
  if(beforeId==null||beforeId===id){arr.push(id);}else{const i=arr.indexOf(beforeId);if(i<0)arr.push(id);else arr.splice(i,0,id);}
  DB.boardOrder=arr;saveDB();paintCoGrid();
}
function moveToTop(id){materializeOrder();let arr=DB.boardOrder.filter(x=>x!==id);arr.unshift(id);DB.boardOrder=arr;saveDB();coSort='board';paintCoGrid();toast('Moved to top');}
function moveUpVisible(id){
  const i=coRenderedIds.indexOf(id);if(i<=0){moveToTop(id);return;}
  placeBefore(id,coRenderedIds[i-1]);toast('Moved up');
}
function resetBoardOrder(){if(!confirm('Reset to fit-based order? Your manual arrangement will be cleared.'))return;DB.boardOrder=[];saveDB();renderCompanies();toast('Reset to fit order');}

function paintCoGrid(){
  const grid=$('#coGrid');if(!grid)return;
  const list=DB.companies.filter(coMatches).sort(coSort==='board'?boardCmp:fitCmp);
  coRenderedIds=list.map(c=>c.id);
  if(!list.length){grid.innerHTML='<div class="empty">No companies match this filter.</div>';return;}
  const board=coSort==='board';
  grid.innerHTML=list.map(co=>{
    const known=contactsAt(co.name);
    const tgts=(co.targets||[]).length;
    return `<div class="co-card${board?' draggable':''}" data-id="${co.id}" ${board?'draggable="true"':''} onclick="openCompany('${co.id}')">
      <div class="co-top">
        <div style="min-width:0"><div class="co-name">${esc(co.name)}</div><div class="co-cat">${esc(co.category||'—')}</div></div>
        <div class="co-chips" style="align-items:center">
          ${board?`<button class="co-mv" title="Move to top" onclick="event.stopPropagation();moveToTop('${co.id}')">⤒</button><button class="co-mv" title="Move up" onclick="event.stopPropagation();moveUpVisible('${co.id}')">↑</button><span class="co-grip" title="Drag to reorder">⠿</span>`:''}
          <span class="chip tier${co.tier}">Tier ${esc(co.tier)}</span>
        </div>
      </div>
      <div class="co-chips">
        <span class="chip ${statusChip(co.status)}">${esc(co.status||'Target')}</span>
        ${co.warmPath?`<span class="chip green">🤝 ${esc(co.warmPath.split(',')[0])}</span>`:''}
      </div>
      <div class="co-stats">
        <div class="co-stat"><div class="n">${co.fitScore||'—'}</div><div class="l">Fit</div></div>
        <div class="co-stat"><div class="n">${known.length}</div><div class="l">Known</div></div>
        <div class="co-stat"><div class="n">${tgts}</div><div class="l">Targets</div></div>
      </div>
      <div class="co-next" onclick="event.stopPropagation();editNextInline(this,'${co.id}')" title="Click to edit">${co.nextAction?`<b>Next:</b> ${esc(co.nextAction)}`:'<span class="next-empty">+ Set next action</span>'}</div>
    </div>`;
  }).join('');
  if(board)wireDragReorder(grid);
}
function wireDragReorder(grid){
  let dragId=null;
  grid.querySelectorAll('.co-card.draggable').forEach(card=>{
    card.addEventListener('dragstart',e=>{dragId=card.dataset.id;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';try{e.dataTransfer.setData('text/plain',dragId);}catch(_){}});
    card.addEventListener('dragend',()=>{dragId=null;grid.querySelectorAll('.co-card').forEach(c=>c.classList.remove('dragging','drop-before','drop-after'));});
    card.addEventListener('dragover',e=>{
      e.preventDefault();if(!dragId||card.dataset.id===dragId)return;
      const r=card.getBoundingClientRect();const after=e.clientY>r.top+r.height/2;
      grid.querySelectorAll('.co-card').forEach(c=>c.classList.remove('drop-before','drop-after'));
      card.classList.add(after?'drop-after':'drop-before');
    });
    card.addEventListener('drop',e=>{
      e.preventDefault();if(!dragId||card.dataset.id===dragId)return;
      const r=card.getBoundingClientRect();const after=e.clientY>r.top+r.height/2;
      const targetId=card.dataset.id;
      const idx=coRenderedIds.indexOf(targetId);
      let beforeId;
      if(after){beforeId=coRenderedIds[idx+1]||null;}else{beforeId=targetId;}
      placeBefore(dragId,beforeId);
    });
  });
}
function editNextInline(el,id){
  if(el.querySelector('input'))return; // already editing
  const co=company(id);if(!co)return;
  const card=el.closest('.co-card');if(card)card.setAttribute('draggable','false');
  el.classList.add('editing');
  el.innerHTML=`<input class="next-edit" value="${esc(co.nextAction||'')}" placeholder="Type next action, then Enter…">`;
  const inp=el.querySelector('input');inp.focus();inp.select();
  let done=false;
  const finish=commit=>{
    if(done)return;done=true;
    if(commit){co.nextAction=inp.value.trim();saveDB();}
    if(card)card.setAttribute('draggable','true');
    el.classList.remove('editing');
    paintCoGrid();
    if(commit)toast('Saved');
  };
  inp.addEventListener('click',e=>e.stopPropagation());
  inp.addEventListener('mousedown',e=>e.stopPropagation());
  inp.addEventListener('keydown',e=>{e.stopPropagation();if(e.key==='Enter'){e.preventDefault();finish(true);}else if(e.key==='Escape'){finish(false);}});
  inp.addEventListener('blur',()=>finish(true));
}

function editCoField(f){const co=company(curCo);const v=prompt(f,co[f]||'');if(v!==null){co[f]=v.trim();saveDB();paintCompanyDrawer(co);renderCompanies();}}
function setCoSelect(f,v){const co=company(curCo);co[f]=v;saveDB();renderCompanies();if(f==='tier'||f==='status')paintCompanyDrawer(co);}
function setCoNum(f,v){
  const co=company(curCo);if(!co)return;
  let n=parseInt(v,10);
  if(isNaN(n)){co[f]=0;}else{n=Math.max(0,Math.min(10,n));co[f]=n;}
  saveDB();renderCompanies();
  if(location.hash.startsWith('#company'))renderCompanyFull(co);
  toast('Saved');
}
function archiveCo(id){const co=company(id);co.archived=!co.archived;saveDB();renderCompanies();paintCompanyDrawer(co);toast(co.archived?'Archived':'Restored');}
function deleteCo(id){if(!confirm('Delete this company? (contacts stay)'))return;DB.companies=DB.companies.filter(c=>c.id!==id);saveDB();Drawer.close();renderCompanies();}
function addTarget(coId){
  const co=company(coId);
  const name=prompt('Name?');if(!name)return;
  const title=prompt('Title?','')||'';
  const reach=(prompt('How do you reach them? known / warm-intro / recruiter / cold','cold')||'cold').trim();
  const sen=guessSeniority(title);
  co.targets=co.targets||[];co.targets.push({name:name.trim(),title:title.trim(),seniority:sen.label,srank:sen.rank,reach,via:'',status:'To contact',notes:''});
  saveDB();paintCompanyDrawer(co);renderCompanies();
}
function editTarget(coId,i){
  const co=company(coId),t=co.targets[i];
  const opt=prompt('Edit target — type:\n  d = delete\n  r = change reach (known/warm-intro/recruiter/cold)\n  t = edit title\n  v = set "via" connector\n(Enter to cancel)','');
  if(opt==='d'){co.targets.splice(i,1);}
  else if(opt==='r'){t.reach=(prompt('reach: known / warm-intro / recruiter / cold',t.reach)||t.reach).trim();}
  else if(opt==='t'){t.title=(prompt('title',t.title)||t.title).trim();const s=guessSeniority(t.title);t.seniority=s.label;t.srank=s.rank;}
  else if(opt==='v'){t.via=(prompt('intro via (connector name)',t.via||'')||'').trim();if(t.via)t.reach='warm-intro';}
  else return;
  saveDB();paintCompanyDrawer(co);renderCompanies();
}
function guessSeniority(title){
  const t=(title||'').toLowerCase();
  if(/\b(ceo|chief|cmo|cro|coo|founder|president)\b/.test(t))return{label:'C-Level / Founder',rank:5};
  if(/\b(svp|evp)\b/.test(t))return{label:'SVP / EVP',rank:5};
  if(/\b(vp|vice president)\b/.test(t))return{label:'VP',rank:4};
  if(/(sr\.? director|senior director)/.test(t))return{label:'Sr. Director',rank:4};
  if(/(head of|gm|general manager)/.test(t))return{label:'Head / GM',rank:4};
  if(/director/.test(t))return{label:'Director',rank:3};
  if(/(lead|principal)/.test(t))return{label:'Lead / Principal',rank:2};
  if(/manager/.test(t))return{label:'Manager',rank:2};
  if(/(recruiter|talent)/.test(t))return{label:'Recruiter / Talent',rank:1};
  return{label:'IC / Other',rank:1};
}

/* research */
async function runResearch(coId,sfx){
  sfx=sfx||'';
  const txt=$('#resText'+sfx).value.trim();
  if(!txt){toast('Paste some LinkedIn text first');return;}
  if(!AI.key()){goTab('settings');toast('Add your Anthropic key in Settings');return;}
  const btn=$('#resBtn'+sfx);btn.innerHTML='<span class="spinner"></span> Reading…';btn.disabled=true;
  try{
    const co=company(coId);
    const people=await AI.extractPeople({text:txt,coName:co.name});
    showResearchResults(coId,people,sfx);
  }catch(e){$('#resOut'+sfx).innerHTML=`<div class="empty" style="color:var(--red)">${e.message==='no-key'?'Add your Anthropic key in Settings.':'Error: '+esc(e.message)}</div>`;}
  btn.innerHTML='Extract people';btn.disabled=false;
}
async function researchImage(ev,coId,sfx){
  sfx=sfx||'';
  const f=ev.target.files[0];if(!f)return;
  if(!AI.key()){goTab('settings');toast('Add your Anthropic key in Settings');return;}
  $('#resOut'+sfx).innerHTML='<div class="subtle"><span class="spinner" style="border-color:rgba(0,0,0,.2);border-top-color:var(--accent)"></span> Reading screenshot…</div>';
  try{
    const data=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(f);});
    const co=company(coId);
    const people=await AI.extractPeople({image:{type:'base64',media_type:f.type||'image/png',data},coName:co.name});
    showResearchResults(coId,people,sfx);
  }catch(e){$('#resOut'+sfx).innerHTML=`<div class="empty" style="color:var(--red)">Error: ${esc(e.message)}</div>`;}
  ev.target.value='';
}
function showResearchResults(coId,people,sfx){
  sfx=sfx||'';
  const out=$('#resOut'+sfx);
  if(!people||!people.length){out.innerHTML='<div class="empty">No relevant people found.</div>';return;}
  window._research={coId,people,sfx};
  out.innerHTML=`<div class="subtle" style="margin-bottom:.4rem">Found ${people.length}. Tap to add to Top targets:</div>`+
    people.map((p,i)=>`<div class="target-row"><div class="rank">+</div><div class="pm" style="flex:1"><div class="pn" style="font-weight:600;font-size:.86rem">${esc(p.name)}</div><div class="pt" style="font-size:.74rem;color:var(--muted)">${esc(p.title||'')} · ${esc(p.seniority||'')}</div></div><button class="btn sm" onclick="addResearchPerson(${i})">Add</button></div>`).join('')+
    `<button class="btn ghost sm" style="margin-top:.5rem" onclick="addAllResearch()">Add all ${people.length}</button>`;
}
function refreshCoView(co){ if(location.hash.startsWith('#company'))renderCompanyFull(co); else paintCompanyDrawer(co); renderCompanies(); }
function addResearchPerson(i){
  const {coId,people}=window._research;const p=people[i];const co=company(coId);
  const s=guessSeniority(p.title||'')||{};
  co.targets=co.targets||[];
  if(!co.targets.some(t=>canonName(t.name)===canonName(p.name)))
    co.targets.push({name:p.name,title:p.title||'',seniority:p.seniority||s.label,srank:s.rank,reach:'cold',via:'',status:'To contact',notes:p.note||''});

function addAllResearch(){const {people}=window._research;people.forEach((_,i)=>addResearchPerson(i));toast('Added all');}

let DIR=[]; let dirQ='', dirBoardOnly=false, dirRelevant=false;

function dirMatches(d){
  const q=dirQ.trim().toLowerCase();
  if(q && !((d.name||'').toLowerCase().includes(q)||(d.company||'').toLowerCase().includes(q)||(d.title||'').toLowerCase().includes(q)))return false;

  if(dirRelevant && !liRelevant(d.title))return false;

function paintDirectory(){
  const body=$('#dirBody');if(!body)return;
  if(!dirQ.trim() && !dirBoardOnly && !dirRelevant){
    body.innerHTML=`<div class="empty" style="padding:1.2rem;text-align:center">Type a name, company, or title to search your ${DIR.length} connections — or tap a filter above.</div>`;
    return;
  }
  const have=new Set(DB.contacts.map(c=>canonName(c.name)));
  const all=DIR.filter(dirMatches);

  let html=`<div class="subtle" style="font-size:.8rem;margin-bottom:.4rem">${all.length} ${all.length===1?'match':'matches'}${all.length>CAP?` · showing first ${CAP}`:''}</div><table class="tbl"><tbody>`;
  shown.forEach(d=>{
    const inC=have.has(canonName(d.name));

      <td><div style="font-weight:600">${esc(d.name)}</div><div class="subtle" style="font-size:.78rem">${esc(d.title||'—')}${d.company?' · '+esc(d.company):''}${onBoard?' <span class="chip slate" style="font-size:.5rem">on board</span>':''}</div></td>

function addFromDirectory(id){
  const d=DIR.find(x=>x.id===id);if(!d)return;
  if(DB.contacts.some(c=>canonName(c.name)===canonName(d.name))){toast('Already in contacts');paintDirectory();return;}
  const ck=coCanon(d.company);const onBoard=DB.companies.find(co=>coCanon(co.name)===ck);
  const comp=onBoard?onBoard.name:d.company;
  const sn=guessSeniority(d.title);
  const senior=/director|vice president|\bvp\b|head|chief|\bgm\b|general manager|svp|evp|principal/i.test(d.title||'');
  const rt=/recruit|talent/i.test(d.title||'')?'Recruiter':(senior?'Hiring Manager':'Connector');
  const c={id:uid('c'),name:d.name,company:comp,title:d.title||'',seniority:sn.label,srank:sn.rank,strength:'Weak',
    roleType:rt,roleRaw:'LinkedIn directory',lastTouch:'',nextTouch:'',status:'New',nextStep:'Check in',
    email:'',notes:'LinkedIn directory'+(comp?' · '+comp:'')+(d.conn?' · connected '+d.conn:''),linkedinUrl:d.url||'',touchpoints:[],isTarget:false,source:'linkedin-dir'};
  DB.contacts=DB.contacts.concat([c]);saveDB();
  const nc=$('#netCount');if(nc)nc.textContent=DB.contacts.length;
  toast('✓ Added '+d.name+' — Push & Pull to sync');
  paintDirectory();
}
function renderNetwork(){
  const sub=$('#cSub');
  const sorts=[['manual','⠿ My order'],['lastTouch','Last touch'],['name','Name'],['roleType','Role'],['strength','Tie'],['status','Status']];
  const arrow = cDir==='asc'?'↑':'↓';
  sub.innerHTML=`

      ${[['all','All'],['strong','Strong ties'],['Connector','Connectors'],['Recruiter','Recruiters'],['Hiring Manager','Hiring mgrs'],['due','Due'],['queue','Outreach queue']].map(([k,l])=>`<button class="fb ${cFilter===k?'on':''}" data-f="${k}">${l}</button>`).join('')}
    </div>
    <button class="btn ghost sm" onclick="openAddFromScreenshot()" style="margin-left:auto">📷 From screenshot</button>

  </div>

    <span class="board-lbl">Sort:</span>
    <div class="seg">${sorts.map(([k,l])=>`<button class="seg-b ${cSort===k?'on':''}" onclick="setCSort('${k}')">${l}${cSort===k&&k!=='manual'?' '+arrow:''}</button>`).join('')}</div>
    ${cSort==='manual'?`<span class="board-hint">Drag the ⠿ handle to reorder — or use ⤒ / ↑. Build your top-of-mind pipeline. <button class="linkout" onclick="resetContactOrder()">Reset</button></span>`:`<span class="board-hint">Tap the active sort again to flip ${cDir==='asc'?'oldest→newest':'newest→oldest'}.</span>`}
  </div>
  <table class="tbl"><thead><tr>
    ${cSort==='manual'?'<th style="width:1px"></th>':''}
    <th data-s="name">Name</th><th data-s="company">Company</th>
    <th data-s="roleType">Role</th><th data-s="strength">Tie</th><th data-s="status">Status</th><th data-s="lastTouch">Last touch</th><th data-s="nextStep">Next step</th>
  </tr></thead><tbody id="cBody"></tbody></table>`;
  $('#cSearch').oninput=e=>{cSearch=e.target.value;paintContacts();};
  $('#cFilters').querySelectorAll('.fb').forEach(b=>b.onclick=()=>{cFilter=b.dataset.f;renderNetwork();});
  sub.querySelectorAll('.tbl th[data-s]').forEach(th=>th.onclick=()=>setCSort(th.dataset.s));

function setCSort(key){
  if(key==='manual'){cSort='manual';}
  else if(cSort===key){cDir=cDir==='asc'?'desc':'asc';}
  else {cSort=key;cDir=(key==='lastTouch')?'desc':'asc';}
  renderContacts();
}
function cMatches(c){
  const s=cSearch.trim().toLowerCase();
  if(s && !((c.name||'').toLowerCase().includes(s)||(c.company||'').toLowerCase().includes(s)||(c.title||'').toLowerCase().includes(s)))return false;
  if(cFilter==='strong')return c.strength==='Strong';
  if(cFilter==='Connector')return /connector/i.test(c.roleType+(c.roleRaw||''));
  if(cFilter==='Recruiter')return /recruiter/i.test(c.roleType);
  if(cFilter==='Hiring Manager')return /hiring/i.test(c.roleType);
  if(cFilter==='due')return c.nextTouch&&c.nextTouch<=today();
  if(cFilter==='queue')return ['Check in','Send update','Ask for intro'].includes(c.nextStep)||c.status==='Reaching out';
  return true;
}
/* ---- contact manual ordering ---- */
function cIndex(id){const i=(DB.contactOrder||[]).indexOf(id);return i<0?1e9:i;}
function cFallbackCmp(a,b){return (b.lastTouch||'').localeCompare(a.lastTouch||'');} // newest first
function cManualCmp(a,b){const ia=cIndex(a.id),ib=cIndex(b.id);if(ia!==ib)return ia-ib;return cFallbackCmp(a,b);}
function cKeyCmp(a,b){
  const dir=cDir==='asc'?1:-1;
  if(cSort==='lastTouch')return dir*((a.lastTouch||'').localeCompare(b.lastTouch||''));
  if(cSort==='strength'){const o={Strong:0,Medium:1,Weak:2,Unknown:3};return dir*((o[a.strength]??3)-(o[b.strength]??3));}
  return dir*String(a[cSort]||'').localeCompare(String(b[cSort]||''));
}
function materializeCOrder(){DB.contactOrder=DB.contacts.slice().sort(cManualCmp).map(c=>c.id);}
function placeContactBefore(id,beforeId){
  materializeCOrder();let arr=DB.contactOrder.filter(x=>x!==id);
  if(beforeId==null||beforeId===id){arr.push(id);}else{const i=arr.indexOf(beforeId);if(i<0)arr.push(id);else arr.splice(i,0,id);}
  DB.contactOrder=arr;saveDB();paintContacts();
}
function moveContactTop(id){materializeCOrder();let arr=DB.contactOrder.filter(x=>x!==id);arr.unshift(id);DB.contactOrder=arr;saveDB();if(cSort!=='manual'){cSort='manual';renderContacts();}else{paintContacts();}toast('Moved to top');}
function moveContactUp(id){const i=cRenderedIds.indexOf(id);if(i<=0){moveContactTop(id);return;}placeContactBefore(id,cRenderedIds[i-1]);toast('Moved up');}
function resetContactOrder(){if(!confirm('Clear your manual contact order?'))return;DB.contactOrder=[];saveDB();renderContacts();toast('Order reset');}

function paintContacts(){
  const body=$('#cBody');if(!body)return;
  const manual=cSort==='manual';
  let list=DB.contacts.filter(cMatches).sort(manual?cManualCmp:cKeyCmp);
  cRenderedIds=list.map(c=>c.id);
  const cols=manual?8:7;
  if(!list.length){body.innerHTML='<tr><td colspan="'+cols+'"><div class="empty">No contacts match.</div></td></tr>';return;}
  body.innerHTML=list.map(c=>{
    const coRef=DB.companies.find(x=>canonName(x.name)===canonName(c.company));
    return `<tr data-id="${c.id}">
    ${manual?`<td class="grip-cell"><span class="c-grip" draggable="true" data-id="${c.id}" title="Drag to reorder">⠿</span><div class="c-mvs"><button class="co-mv" title="To top" onclick="event.stopPropagation();moveContactTop('${c.id}')">⤒</button><button class="co-mv" title="Up" onclick="event.stopPropagation();moveContactUp('${c.id}')">↑</button></div></td>`:''}
    <td data-l="Name" class="nm"><a onclick="openContactFull('${c.id}')" draggable="false" style="cursor:pointer">${esc(c.name)}</a> <button class="linkout" draggable="false" onclick="openContact('${c.id}')" title="Quick view">⤢</button></td>
    <td data-l="Company">${coRef?`<a onclick="openCompanyFull('${coRef.id}')" draggable="false" style="cursor:pointer">${esc(c.company)}</a>`:esc(c.company||'—')}</td>
    <td data-l="Role"><span class="chip slate" style="font-size:.55rem">${esc(c.roleType||'—')}</span></td>
    <td data-l="Tie"><select class="inline-sel" onchange="quickSetContact('${c.id}','strength',this.value)">${['Strong','Medium','Weak','Unknown'].map(s=>`<option ${c.strength===s?'selected':''}>${s}</option>`).join('')}</select></td>
    <td data-l="Status"><select class="inline-sel" onchange="quickSetContact('${c.id}','status',this.value)">${CONTACT_STATUS.map(s=>`<option ${c.status===s?'selected':''}>${s}</option>`).join('')}</select></td>
    <td data-l="Last touch">${c.lastTouch?fmtDate(c.lastTouch)+' <span class="subtle">('+daysAgo(c.lastTouch)+'d)</span>':'—'}</td>
    <td data-l="Next step"><select class="inline-sel" onchange="quickSetNextStep('${c.id}',this.value)">${NEXT_STEPS.map(s=>`<option ${c.nextStep===s?'selected':''}>${s}</option>`).join('')}</select>${c.nextStep==='Call scheduled'?` <button class="chip accent" style="font-size:.5rem" onclick="openCallPicker('${c.id}')">📅 ${c.callDate?esc(fmtCallWhen(c)):'set'}</button>`:(c.nextTouch&&c.nextTouch<=today()?' <span class="chip amber" style="font-size:.5rem">due</span>':'')}</td>
  </tr>`;}).join('');
  if(manual)wireContactDrag(body);
}
function wireContactDrag(body){
  let dragId=null;
  body.querySelectorAll('.c-grip').forEach(grip=>{
    grip.addEventListener('dragstart',e=>{
      dragId=grip.dataset.id;const tr=grip.closest('tr');tr.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';try{e.dataTransfer.setData('text/plain',dragId);e.dataTransfer.setDragImage(tr,20,16);}catch(_){}
    });
    grip.addEventListener('dragend',()=>{dragId=null;body.querySelectorAll('tr').forEach(r=>r.classList.remove('dragging','drop-before','drop-after'));});
  });
  body.querySelectorAll('tr[data-id]').forEach(tr=>{
    tr.addEventListener('dragover',e=>{
      if(!dragId||tr.dataset.id===dragId)return;e.preventDefault();
      const r=tr.getBoundingClientRect();const after=e.clientY>r.top+r.height/2;
      body.querySelectorAll('tr').forEach(x=>x.classList.remove('drop-before','drop-after'));
      tr.classList.add(after?'drop-after':'drop-before');
    });
    tr.addEventListener('drop',e=>{
      if(!dragId||tr.dataset.id===dragId)return;e.preventDefault();
      const r=tr.getBoundingClientRect();const after=e.clientY>r.top+r.height/2;
      const idx=cRenderedIds.indexOf(tr.dataset.id);
      const beforeId=after?(cRenderedIds[idx+1]||null):tr.dataset.id;
      placeContactBefore(dragId,beforeId);
    });
  });
}

function openAddFromScreenshot(){
  window._npImg=null;
  Drawer.open(`
    <div class="dr-head"><button class="dr-close" onclick="Drawer.close()">✕</button>
      <div style="flex:1"><div class="dr-title" style="font-size:1.2rem">Add contact from LinkedIn</div>
      <div class="dr-sub">Paste a screenshot or the profile text — Claude fills in the details.</div></div></div>
    <div class="dr-body">
      <div class="dr-sec">
        <div class="dr-sec-h">1 · Drop in the profile</div>
        <label class="btn ghost sm" style="cursor:pointer;width:100%;justify-content:center">📷 Choose / paste a screenshot<input type="file" accept="image/*" style="display:none" onchange="npPickImage(event)"></label>
        <div id="npImgState" class="subtle" style="font-size:.78rem;margin:.4rem 0"></div>
        <div class="subtle" style="font-size:.78rem;margin:.5rem 0 .3rem">…or paste the profile text:</div>
        <textarea class="ta" id="npText" placeholder="Paste name, headline, About, experience…"></textarea>
      </div>
      <button class="btn" id="npParseBtn" style="width:100%;justify-content:center" onclick="parseNewContact()">✨ Parse with Claude</button>
      <div id="npResult" style="margin-top:.8rem"></div>
    </div>`);
  // allow pasting an image straight into the drawer
  const ta=$('#npText');
  if(ta)ta.addEventListener('paste',e=>{
    const items=(e.clipboardData||{}).items||[];
    for(const it of items){if(it.type&&it.type.indexOf('image')===0){const f=it.getAsFile();if(f){readNpImage(f);e.preventDefault();}}}
  });
}
function npPickImage(ev){const f=ev.target.files[0];if(f)readNpImage(f);}
function readNpImage(f){
  const r=new FileReader();
  r.onload=()=>{window._npImg={type:'base64',media_type:f.type||'image/png',data:r.result.split(',')[1]};const s=$('#npImgState');if(s)s.innerHTML='<span class="chip green">✓ Screenshot ready</span>';};
  r.readAsDataURL(f);
}
async function parseNewContact(){
  if(!AI.key()){goTab('settings');toast('Add your Anthropic key in Settings');return;}
  const text=($('#npText')&&$('#npText').value.trim())||'';
  if(!window._npImg && !text){toast('Add a screenshot or paste some text first');return;}
  const btn=$('#npParseBtn');btn.innerHTML='<span class="spinner"></span> Reading…';btn.disabled=true;
  try{
    const d=await AI.parseContact({image:window._npImg||undefined,text:text||undefined});
    showContactPreview(d);
  }catch(e){$('#npResult').innerHTML=`<div class="empty" style="color:var(--red)">Couldn\u2019t parse that: ${esc(e.message)}</div>`;}
  btn.innerHTML='✨ Parse with Claude';btn.disabled=false;
}
function showContactPreview(d){
  window._npParsed=d||{};
  const roles=['Referral Source','Connector','Recruiter','Hiring Manager','Peer','Consulting Prospect','Agency','Founder','Unclassified'];
  const rt=roles.includes(d.roleType)?d.roleType:'Unclassified';
  $('#npResult').innerHTML=`
    <div class="dr-sec">
      <div class="dr-sec-h">2 · Review & save</div>
      <div class="field"><label>Name</label><input id="np_name" value="${esc(d.name||'')}"></div>
      <div class="field-row">
        <div class="field"><label>Title</label><input id="np_title" value="${esc(d.title||'')}"></div>
        <div class="field"><label>Company</label><input id="np_company" value="${esc(d.company||'')}"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Role type</label><select id="np_role">${roles.map(s=>`<option ${rt===s?'selected':''}>${s}</option>`).join('')}</select></div>
        <div class="field"><label>Relationship strength</label><select id="np_strength">${['Strong','Medium','Weak','Unknown'].map(s=>`<option ${s==='Weak'?'selected':''}>${s}</option>`).join('')}</select></div>
      </div>
      <div class="field"><label>Note</label><textarea class="ta" id="np_note">${esc(d.note||'')}</textarea></div>
      <button class="btn" style="width:100%;justify-content:center" onclick="saveNewContact()">✓ Save contact</button>
    </div>`;
}
function saveNewContact(){
  const g=id=>($('#'+id)?$('#'+id).value.trim():'');
  const name=g('np_name');if(!name){toast('Name is required');return;}
  const title=g('np_title');const s=guessSeniority(title)||{};
  const c={id:uid('c'),name,company:g('np_company'),title,seniority:(window._npParsed&&window._npParsed.seniority)||s.label||'',srank:s.rank||1,
    strength:g('np_strength')||'Weak',roleType:g('np_role')||'Unclassified',roleRaw:g('np_role')||'',
    lastTouch:'',nextTouch:'',status:'New',nextStep:'Check in',email:'',notes:g('np_note'),touchpoints:[],isTarget:false,source:'screenshot'};
  DB.contacts.push(c);saveDB();window._npImg=null;window._npParsed=null;
  Drawer.close();renderContacts();toast('✓ Added '+name);
  openContactFull(c.id);
}

   PEOPLE TO MEET  (aspirational leaders to get introduced to)
   ============================================================ */
let pSearch='', pFilter='active';
function renderPeople(){
  const sub=$('#cSub');
  sub.innerHTML=`
  <div class="ctrlbar">
    <div class="searchbox"><span class="ic">⌕</span><input id="pSearch" placeholder="Search ${(DB.people||[]).length} people to meet…" value="${esc(pSearch)}"></div>
    <div class="filterset" id="pFilters">
      ${[['active','Working on'],['all','All'],['Identified','Identified'],['Building','Building'],['Parked','Parked']].map(([k,l])=>`<button class="fb ${pFilter===k?'on':''}" data-f="${k}">${l}</button>`).join('')}
    </div>
    <button class="btn ghost sm" onclick="openAddPersonScreenshot()" style="margin-left:auto">📷 From screenshot</button>
    <button class="btn sm" onclick="addPerson()">+ Add person</button>
  </div>
  <div class="board-bar"><span class="board-hint">Senior leaders you want to get introduced to. Track who can open the door and where the intro stands.</span></div>
  <table class="tbl"><thead><tr>
    <th>Name</th><th>Title</th><th>Company</th><th>Intro via</th><th>Stage</th>
  </tr></thead><tbody id="pBody"></tbody></table>`;
  $('#pSearch').oninput=e=>{pSearch=e.target.value;paintPeople();};
  $('#pFilters').querySelectorAll('.fb').forEach(b=>b.onclick=()=>{pFilter=b.dataset.f;renderPeople();});
  paintPeople();
}
function pMatches(p){
  const s=pSearch.trim().toLowerCase();
  if(s && !((p.name||'').toLowerCase().includes(s)||(p.company||'').toLowerCase().includes(s)||(p.title||'').toLowerCase().includes(s)))return false;
  if(pFilter==='active')return PEOPLE_ACTIVE.includes(p.status);
  if(pFilter==='all')return true;
  return p.status===pFilter;
}
function paintPeople(){
  const body=$('#pBody');if(!body)return;
  let list=(DB.people||[]).filter(pMatches).sort((a,b)=>{
    const o={}; PEOPLE_STAGES.forEach((s,i)=>o[s]=i);
    if((o[a.status]??9)!==(o[b.status]??9))return (o[a.status]??9)-(o[b.status]??9);
    return (b.srank||0)-(a.srank||0);
  });
  if(!list.length){body.innerHTML='<tr><td colspan="5"><div class="empty">No one here yet. Add a leader you\u2019d want to work for — paste a LinkedIn screenshot or use + Add person.</div></td></tr>';return;}
  body.innerHTML=list.map(p=>{
    const via=p.introContactId?contact(p.introContactId):null;
    const coRef=DB.companies.find(x=>canonName(x.name)===canonName(p.company));
    return `<tr>
      <td data-l="Name" class="nm"><a onclick="openPersonFull('${p.id}')" style="cursor:pointer">${esc(p.name)}</a></td>
      <td data-l="Title">${esc(p.title||'—')}</td>
      <td data-l="Company">${coRef?`<a onclick="openCompanyFull('${coRef.id}')" style="cursor:pointer">${esc(p.company)}</a>`:esc(p.company||'—')}</td>
      <td data-l="Intro via">${via?`<a onclick="openContactFull('${via.id}')" style="cursor:pointer">${esc(via.name)}</a>`:'<span class="subtle">need a path</span>'}</td>
      <td data-l="Stage"><select class="inline-sel" onchange="quickSetPerson('${p.id}','status',this.value)">${PEOPLE_STAGES.map(s=>`<option ${p.status===s?'selected':''}>${s}</option>`).join('')}</select></td>
    </tr>`;}).join('');
}
function quickSetPerson(id,f,v){const p=person(id);if(!p)return;p[f]=v;saveDB();paintPeople();renderWeek();toast('Saved');if(location.hash.startsWith('#person'))renderPersonFull(p);}
function addPerson(){
  const name=prompt('Name?');if(!name)return;
  const p={id:uid('p'),name:name.trim(),title:'',company:'',seniority:'',srank:1,why:'',introContactId:'',status:'Identified',notes:'',source:'manual',created:today()};
  DB.people.push(p);saveDB();renderContacts();toast('Added '+p.name);openPersonFull(p.id);
}
function deletePerson(id){if(!confirm('Remove this person from your list?'))return;DB.people=DB.people.filter(p=>p.id!==id);saveDB();if(location.hash.startsWith('#person'))backFromFull();renderContacts();}
